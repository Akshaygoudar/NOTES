<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Sejal ❤️</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(to bottom, #a1c4fd, #c2e9fb);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    color: #444;
    overflow: hidden;
}

/* MAIN CARD */
.container {
    width: 90%;
    max-width: 600px;
    background: rgba(255,255,255,0.95);
    padding: 40px;
    border-radius: 25px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    z-index: 2;
}

h1, h2 {
    color: #d63384;
}

p {
    font-size: 1.2rem;
    line-height: 1.6;
}

/* BUTTON */
button {
    margin-top: 30px;
    padding: 12px 25px;
    border: none;
    background: #d63384;
    color: white;
    font-size: 1rem;
    border-radius: 30px;
    cursor: pointer;
}

button:hover {
    background: #b0256b;
}

/* BACKGROUND FLOATING */
.background-decor {
    position: fixed;
    width: 100%;
    height: 100%;
    overflow: hidden;
    top: 0;
    left: 0;
    z-index: 0;
}

.floating {
    position: absolute;
    animation: floatUp linear infinite;
    opacity: 0.7;
}

@keyframes floatUp {
    0% {
        transform: translateY(100vh);
        opacity: 0;
    }
    20% {
        opacity: 1;
    }
    100% {
        transform: translateY(-10vh);
        opacity: 0;
    }
}
</style>
</head>

<body>

<div class="background-decor"></div>

<div class="container">
    <div id="content"></div>
    <button onclick="next()">Next ➡️</button>
</div>

<script>

/* PAGES */
const pages = [

`<h1>Hey Sejal ❤️</h1>
<p>
Today is your day… 🎉  
And I just wanted to make something a little different for you.
</p>`,

`<p>
No big gifts…  
No fancy things…  

Just something simple… but real.
</p>`,

`<h1>She is the reason…</h1>`,

`<p>
Some people come into life quietly…  
but leave a big impact without even trying.
</p>`,

`<p>
Not everyone stays.  
Not everyone understands.  
Not everyone makes things feel easy.  
But you do ❤️
</p>`,

`<p>
If life was a system…  
you’d be the part that keeps everything running smoothly.
</p>`,

`<p>
…random days feel better  
…small moments feel special  
…life feels lighter  
…smiles come naturally
</p>`,

`<h2>
No big words.  
No fancy lines.  

Just one thing —  
you matter more than you think ❤️  

And that’s you, Sejal ❤️
</h2>`,

`<p>
Thank you for being in my life.  
Thank you for staying.  
Thank you for being you.  

I’m really grateful for you… more than I can put into words ❤️
</p>`,

`<h2>
Happy Birthdayyyy Beautiful ❤️ <br><br>
Happy 21st to my favourite one ✨
</h2>`
];

let index = 0;

function showPage() {
    document.getElementById("content").innerHTML = pages[index];
}

function next() {
    if(index < pages.length - 1){
        index++;
        showPage();
    }
}

showPage();

/* FLOATING BACKGROUND */
const emojis = ["🎈","🎉","✨","💖","🌸"];

function createFloating() {
    const el = document.createElement("div");
    el.className = "floating";
    el.innerText = emojis[Math.floor(Math.random() * emojis.length)];

    el.style.left = Math.random() * 100 + "vw";
    el.style.fontSize = (20 + Math.random() * 20) + "px";
    el.style.animationDuration = (6 + Math.random() * 5) + "s";

    document.querySelector(".background-decor").appendChild(el);

    setTimeout(() => {
        el.remove();
    }, 10000);
}

setInterval(createFloating, 400);

</script>

</body>
</html>
