<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Sejal ❤️</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(to bottom, #a1c4fd, #c2e9fb);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    color: #444;
    overflow: hidden;
}

/* Start Screen */
.start-screen {
    position: fixed;
    width: 100%;
    height: 100%;
    background: #a1c4fd;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 10;
}

.start-btn {
    padding: 15px 30px;
    font-size: 1.2rem;
    border: none;
    border-radius: 30px;
    background: #d63384;
    color: white;
    cursor: pointer;
}

/* Card */
.container {
    width: 90%;
    max-width: 600px;
    background: rgba(255,255,255,0.95);
    padding: 40px;
    border-radius: 25px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    display: none;
}

h1, h2 { color: #d63384; }
p { font-size: 1.2rem; }

button {
    margin-top: 20px;
    padding: 12px 25px;
    border: none;
    background: #d63384;
    color: white;
    border-radius: 30px;
    cursor: pointer;
}

/* Floating */
.background-decor {
    position: fixed;
    width: 100%;
    height: 100%;
    z-index: -1;
}

.floating {
    position: absolute;
    animation: floatUp linear infinite;
}

@keyframes floatUp {
    0% { transform: translateY(100vh); }
    100% { transform: translateY(-10vh); }
}
</style>
</head>

<body>

<!-- Start Screen -->
<div class="start-screen" id="startScreen">
    <button class="start-btn" onclick="startExperience()">Tap to Start ❤️</button>
</div>

<div class="background-decor"></div>

<div class="container" id="mainContent">
    <div id="content"></div>
    <button onclick="next()">Next ➡️</button>

    <audio id="bgMusic" loop>
        <source src="https://cdn.pixabay.com/audio/2022/10/25/audio_946b6f54d1.mp3">
    </audio>
</div>

<script>

const pages = [
`<h1>Hey Sejal ❤️</h1><p>Today is your day 🎉</p>`,
`<p>No big gifts… just something real.</p>`,
`<h1>She is the reason…</h1>`,
`<p>Some people come quietly… but mean everything.</p>`,
`<p>Not everyone stays… but you did ❤️</p>`,
`<p>If life was a system… you’d be the best part of it.</p>`,
`<p>…days feel better<br>…life feels lighter</p>`,
`<h2>You matter more than you think ❤️</h2>`,
`<p>I’m really grateful for you ❤️</p>`,
`<h2>Happy Birthdayyyy Beautiful ❤️<br>Happy 21st to my favourite one ✨</h2>`
];

let index = 0;

function showPage() {
    document.getElementById("content").innerHTML = pages[index];
}

function next() {
    if(index < pages.length - 1){
        index++;
        showPage();

        if(index === pages.length - 1){
            confetti({ particleCount: 150, spread: 80 });
        }
    }
}

/* START EXPERIENCE (FIXES MUSIC) */
function startExperience() {
    document.getElementById("startScreen").style.display = "none";
    document.getElementById("mainContent").style.display = "block";

    const music = document.getElementById("bgMusic");
    music.volume = 0.5;
    music.play();
}

showPage();

/* Floating */
const emojis = ["🎈","🎉","✨","💖"];

setInterval(() => {
    const el = document.createElement("div");
    el.className = "floating";
    el.innerText = emojis[Math.floor(Math.random()*emojis.length)];
    el.style.left = Math.random()*100+"vw";
    el.style.animationDuration = "6s";

    document.querySelector(".background-decor").appendChild(el);

    setTimeout(()=>el.remove(),6000);
},500);

</script>

</body>
</html>
