<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Sejal ❤️</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(to bottom, #a1c4fd, #c2e9fb);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    color: #444;
}

.container {
    width: 90%;
    max-width: 600px;
    background: rgba(255,255,255,0.95);
    padding: 40px;
    border-radius: 25px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

h1, h2 {
    color: #d63384;
}

p {
    font-size: 1.2rem;
    line-height: 1.6;
}

button {
    margin-top: 30px;
    padding: 12px 25px;
    border: none;
    background: #d63384;
    color: white;
    font-size: 1rem;
    border-radius: 30px;
    cursor: pointer;
}

button:hover {
    background: #b0256b;
}
</style>
</head>

<body>

<div class="container">
    <div id="content"></div>
    <button onclick="next()">Next ➡️</button>
</div>

<script>
const pages = [

`<h1>Hey Sejal ❤️</h1>
<p>
Today is your day… 🎉  
And I just wanted to make something a little different for you.
</p>`,

`<p>
No big gifts…  
No fancy things…  

Just something simple… but real.
</p>`,

`<h1>She is the reason…</h1>`,

`<p>
Some people come into life quietly…  
but leave a big impact without even trying.
</p>`,

`<p>
Not everyone stays.  
Not everyone understands.  
Not everyone makes things feel easy.  
But you do ❤️
</p>`,

`<p>
If life was a system…  
you’d be the part that keeps everything running smoothly.
</p>`,

`<p>
…random days feel better  
…small moments feel special  
…life feels lighter  
…smiles come naturally
</p>`,

`<h2>
No big words.  
No fancy lines.  

Just one thing —  
you matter more than you think ❤️  

And that’s you, Sejal ❤️
</h2>`,

`<p>
Thank you for being in my life.  
Thank you for staying.  
Thank you for being you.  

I’m really grateful for you… more than I can put into words ❤️
</p>`,

`<h2>Happy Birthday ❤️</h2>`
];

let index = 0;

function showPage() {
    document.getElementById("content").innerHTML = pages[index];
}

function next() {
    if(index < pages.length - 1){
        index++;
        showPage();
    }
}

showPage();
</script>

</body>
</html>
