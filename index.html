<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sejal's 21st | The Adventure</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { margin: 0; font-family: 'Arial Rounded MT Bold', sans-serif; overflow: hidden; background: #fff0f5; }
        .screen { height: 100vh; width: 100vw; display: flex; flex-direction: column; justify-content: center; align-items: center; position: absolute; transition: 0.8s; text-align: center; padding: 20px; box-sizing: border-box; }
        .hidden { transform: translateY(100vh); opacity: 0; }
        
        /* The Final Visual Background */
        #finalScreen { background: url('YOUR_IMAGE_URL_HERE') no-repeat center center/cover; color: white; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 1; }
        .content { z-index: 2; }

        .btn { background: #ff69b4; color: white; border: none; padding: 15px 40px; border-radius: 50px; font-size: 1.2rem; cursor: pointer; margin-top: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .heart { position: absolute; font-size: 2.5rem; cursor: pointer; z-index: 10; }
        #msgBox { height: 150px; overflow-y: auto; text-align: left; background: rgba(255,255,255,0.2); padding: 15px; border-radius: 15px; margin-top: 10px; line-height: 1.6; }
    </style>
</head>
<body>

    <div id="s1" class="screen">
        <h1 style="color: #ff69b4;">Hi Sejal! 🎉</h1>
        <p>I built a small world for your 21st birthday.</p>
        <p>Are you ready for the journey?</p>
        <button class="btn" onclick="next(1, 2); spawnHearts();">Start Adventure</button>
    </div>

    <div id="s2" class="screen hidden">
        <h2 style="color: #ff69b4;">Task: Collect 21 Birthday Wishes</h2>
        <p>Tap the floating hearts to power up your surprise!</p>
        <div id="count" style="font-size: 2rem; font-weight: bold; color: #ff69b4;">0 / 21</div>
    </div>

    <div id="s3" class="screen hidden" id="finalScreen">
        <div class="overlay"></div>
        <div class="content">
            <h1 style="font-size: 2.5rem;">Happy Birthday, Sejal! 🐾</h1>
            <p>A calm beach, your favorite things, and your best friend.</p>
            <div id="msgBox">
                </div>
            <p style="font-weight: bold; margin-top: 10px;">~ Akshay & COCO</p>
            <button class="btn" onclick="confettiBlast()">Blast Confetti! 🎊</button>
        </div>
    </div>

    <script>
        let score = 0;
        const notes = [
            "Everything started from that DTSI class on 19-Oct-2023.",
            "You, me, and little COCO — the best team!",
            "I admire how much you love your family and your pets.",
            "May your 21st year be full of calm water and clear skies.",
            "I'm always rooting for your success, Sejal.",
            "Enjoy your special day to the fullest!"
        ];

        function next(curr, nxt) {
            document.getElementById('s' + curr).classList.add('hidden');
            document.getElementById('s' + nxt).classList.remove('hidden');
        }

        function spawnHearts() {
            const timer = setInterval(() => {
                if(score >= 21) {
                    clearInterval(timer);
                    setTimeout(() => { next(2, 3); showNotes(); }, 1000);
                    return;
                }
                const h = document.createElement('div');
                h.className = 'heart';
                h.innerHTML = Math.random() > 0.5 ? '💖' : '🐶'; // Mix of hearts and paws for COCO
                h.style.left = Math.random() * 80 + 10 + 'vw';
                h.style.top = '100vh';
                document.body.appendChild(h);
                h.animate([{top: '100vh'}, {top: '-10vh'}], {duration: 5000}).onfinish = () => h.remove();
                h.onclick = () => { score++; document.getElementById('count').innerText = `${score} / 21`; h.remove(); };
            }, 800);
        }

        function showNotes() {
            const box = document.getElementById('msgBox');
            notes.forEach((m, i) => {
                setTimeout(() => {
                    box.innerHTML += `<p>✨ ${m}</p>`;
                    box.scrollTop = box.scrollHeight;
                }, i * 3500); // 3.5s delay for 5-minute engagement
            });
            confettiBlast();
        }

        function confettiBlast() {
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        }
    </script>
</body>
</html>
